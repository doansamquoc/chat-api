version: "8.3"
services:
  database:
    container_name: database
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - database-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
volumes:
  database-data: